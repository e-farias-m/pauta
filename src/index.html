<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pauta">
<title>Pauta — Score Editor</title>


<div id="loading">
  <div style="font-size:28px;color:#c05621;font-weight:300;letter-spacing:2px"><span style="color:#c05621;font-weight:700">p</span><span style="color:#2d3748">auta</span></div>
  <div class="loading-spinner"></div>
  <p>Loading notation engine…</p>
</div>

<div id="toast"></div>

<!-- Top Bar -->
<div id="topbar">
  <button class="btn-top" data-action="showNewScoreDialog" title="New score" style="padding:8px 12px;gap:4px"><span style="font-size:16px;font-weight:300">+</span><span style="font-size:11px">New</span></button>
  <button class="btn-top" data-action="showFileMenu" title="Open, save, export scores">
    <svg width="14" height="14" viewBox="0 0 20 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 2 L9 2 L11 4 L18 4 C18.5523 4 19 4.44772 19 5 L19 16 C19 16.5523 18.5523 17 18 17 L2 17 C1.44772 17 1 16.5523 1 16 L1 3 C1 2.44772 1.44772 2 2 2 Z"/>
    </svg>
    <span>File</span>
  </button>
  <button class="btn-top" data-action="showEditMenu" title="Undo, redo, cut, copy, paste">
    <svg width="14" height="14" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 2 L15 2"/>
      <path d="M3 9 L15 9"/>
      <path d="M3 16 L15 16"/>
      <circle cx="6" cy="2" r="1.5" fill="currentColor"/>
      <circle cx="6" cy="9" r="1.5" fill="currentColor"/>
      <circle cx="6" cy="16" r="1.5" fill="currentColor"/>
    </svg>
    <span>Edit</span>
  </button>

  <button class="btn-top" data-action="showScoreMenu" title="Key signature, time signature, transpose, assignments">
    <svg width="14" height="14" viewBox="0 0 18 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 1 L15 1 L15 19 L3 19 Z"/>
      <line x1="6" y1="6" x2="12" y2="6" stroke-width="1.2"/>
      <line x1="6" y1="9" x2="12" y2="9" stroke-width="1.2"/>
      <line x1="6" y1="12" x2="10" y2="12" stroke-width="1.2"/>
      <circle cx="14" cy="17" r="1.5" fill="currentColor"/>
    </svg>
    <span>Score</span>
  </button>
  <button class="btn-top" data-action="showViewMenu" title="Display options, difficulty, view settings">
    <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="10" cy="10" r="2"/>
      <path d="M10 1 v3 M10 16 v3 M1 10 h3 M16 10 h3"/>
      <path d="M3.34 3.34 l2.12 2.12 M14.54 14.54 l2.12 2.12 M3.34 16.66 l2.12-2.12 M14.54 5.46 l2.12-2.12"/>
    </svg>
    <span>View</span>
  </button>
  <button class="btn-top" data-action="showLearnMenu" title="Curriculum and learning content">
    <svg width="14" height="14" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 3 L9 1 L16 3 L16 15 L9 13 L2 15 Z"/>
      <path d="M9 1 L9 13"/>
      <path d="M6 4 L4 4.5 L4 12.5 L6 12"/>
      <path d="M12 4 L14 4.5 L14 12.5 L12 12"/>
    </svg>
    <span>Learn</span>
  </button>
  <button class="btn-top" id="btn-practice" data-action="showPracticeMenu" title="Exercises and drills">
    <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="10" cy="6" r="3"/>
      <path d="M5 17 Q10 11 15 17"/>
    </svg>
    <span>Practice</span>
  </button>
  <button class="btn-top" data-action="showTeachMenu" title="Teacher tools and assignments">
    <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 17 L10 13 L18 17 L18 7 L10 3 L2 7 Z"/>
      <path d="M2 7 L2 13"/>
      <path d="M10 3 L10 13"/>
    </svg>
    <span>Teach</span>
  </button>
  <button class="btn-top" id="btn-input-mode" data-action="toggleInputMode" aria-label="Toggle input mode" title="Toggle note-input mode">
    <svg width="14" height="14" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M13 2 L16 5 L7 14 L3 15 L4 11 Z"/>
      <line x1="11" y1="4" x2="14" y2="7"/>
    </svg>
    <span>Input</span>
  </button>
  <div id="score-title" title="Double-tap to edit">Untitled Score</div>
  <button class="btn-top" data-action="showHelpPanel" title="Help & tips (?)" style="margin-left:auto;margin-right:4px">?</button>
  <div style="display:flex;align-items:center;opacity:0.35;font-size:28px;letter-spacing:0.5px;padding-right:6px">
    <span style="color:#c05621;font-weight:700">P</span><span style="color:#2d3748;font-weight:300">auta</span>
  </div>
</div>

<!-- Transport Bar -->
<div id="transport-bar">
  <button class="btn-circle" id="btn-rewind" data-action="rewindPlayback" aria-label="Rewind" title="Rewind to start (Home)">
    <svg width="16" height="14" viewBox="0 0 16 14" fill="currentColor">
      <polygon points="14,0 14,14 6,7"/>
      <polygon points="8,0 8,14 0,7"/>
    </svg>
  </button>
  <button class="btn-circle" id="btn-play"   data-action="togglePlayback" aria-label="Play or pause" title="Play or pause (Space)">
    <svg id="play-icon" width="16" height="18" viewBox="0 0 16 18" fill="currentColor">
      <polygon points="2,0 14,9 2,18"/>
    </svg>
    <svg id="pause-icon" width="16" height="18" viewBox="0 0 16 18" fill="currentColor" style="display:none">
      <rect x="1" y="0" width="5" height="18" rx="1"/>
      <rect x="10" y="0" width="5" height="18" rx="1"/>
    </svg>
  </button>
  <button class="btn-circle" id="btn-stop"   data-action="stopPlayback" aria-label="Stop playback" title="Stop playback">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
      <rect x="0" y="0" width="14" height="14" rx="2"/>
    </svg>
  </button>
  <div class="tempo-wrap" title="Drag to change tempo">
    <span id="tempo-label">BPM</span>
<input type="range" id="tempo-slider" min="40" max="240" value="120"
            step="1" aria-label="Tempo in beats per minute">
     <input type="number" id="tempo-input" min="40" max="240" value="120"
            aria-label="Tempo in BPM">
  </div>
  <span id="play-pos" title="Playback position">0:00</span>
  <button id="btn-metronome" class="btn-util" data-action="toggleMetronome" aria-label="Toggle metronome" title="Toggle metronome">Metronome</button>
  <button id="btn-countin" class="btn-util" data-action="toggleCountIn" aria-label="Toggle count-in" title="Count-in (1 measure before playback)">Count-in</button>
  <select id="met-subdivision" data-action="setMetronomeSubdivision" title="Metronome subdivision" style="background:transparent;border:1px solid rgba(192,86,33,0.2);border-radius:5px;color:#4a5568;font-size:11px;padding:6px 4px;min-height:44px;cursor:pointer;margin-left:-2px">
    <option value="quarter">♩</option>
    <option value="eighth">♪</option>
    <option value="triplet">♩³</option>
    <option value="sixteenth">♬</option>
  </select>
  <button id="btn-mixer" class="btn-util" data-action="showMixer" aria-label="Mixer" title="Open mixer & MIDI settings">Mixer</button>
</div>

<!-- Mode Banner -->
<div id="mode-banner" style="display:none"></div>

<!-- Score Area -->
<div id="score-area" tabindex="0">
  <div id="score-canvas-container">
    <div id="score-svg"></div>
    <div id="debug-overlay"></div>
  </div>
</div>

<!-- Note Palette -->
<div id="palette">
  <button id="palette-toggle" data-action="togglePalette"><span class="toggle-arrow">▼</span><span id="palette-toggle-label">Hide Palette</span></button>
  <div id="palette-body">
  <!-- Row 1: Noteheads, accidentals, specials -->
  <div class="palette-row">
    <button class="pal-btn" id="btn-dot"  data-action="toggleDot">
      <span class="pal-sym pal-sym-0">
        <svg width="16" height="16" viewBox="0 0 12 12" fill="currentColor"><circle cx="6" cy="6" r="3.5"/></svg>
      </span>
      <span class="pal-lbl">Dot</span>
    </button>
    <button class="pal-btn" id="btn-sharp" data-action="setAcc" data-acc="#"><span class="pal-sym">♯</span><span class="pal-lbl">Sharp</span></button>
    <button class="pal-btn" id="btn-flat"  data-action="setAcc" data-acc="b"><span class="pal-sym">♭</span><span class="pal-lbl">Flat</span></button>
    <button class="pal-btn" id="btn-nat"   data-action="setAcc" data-acc="n"><span class="pal-sym">♮</span><span class="pal-lbl">Natural</span></button>
    <button class="pal-btn" id="btn-triplet" data-action="toggleTuplet" data-num="3" data-den="2">
      <span class="pal-sym pal-sym-0">
        <svg width="20" height="16" viewBox="0 0 20 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
          <ellipse cx="4" cy="12" rx="2.5" ry="1.8" fill="currentColor" stroke="none" transform="rotate(-15 4 12)"/>
          <line x1="6" y1="12" x2="6" y2="4" stroke-width="1.2"/>
          <ellipse cx="10" cy="12" rx="2.5" ry="1.8" fill="currentColor" stroke="none" transform="rotate(-15 10 12)"/>
          <line x1="12" y1="12" x2="12" y2="4" stroke-width="1.2"/>
          <ellipse cx="16" cy="12" rx="2.5" ry="1.8" fill="currentColor" stroke="none" transform="rotate(-15 16 12)"/>
          <line x1="18" y1="12" x2="18" y2="4" stroke-width="1.2"/>
          <text x="10" y="3" text-anchor="middle" font-size="7" font-weight="700" fill="currentColor" stroke="none">3</text>
        </svg>
      </span>
      <span class="pal-lbl">Triplet</span>
    </button>
    <button class="pal-btn" id="btn-chord" data-action="toggleChordMode"><span class="pal-sym" style="font-size:12px">♩+</span><span class="pal-lbl">Chord</span></button>
    <button class="pal-btn" id="btn-voice1" data-action="setVoice" data-voice="1"><span class="pal-sym pal-sym-f12">V1</span><span class="pal-lbl">Voice</span></button>
    <button class="pal-btn" id="btn-voice2" data-action="setVoice" data-voice="2"><span class="pal-sym pal-sym-f12">V2</span><span class="pal-lbl">Voice</span></button>
  </div>
  <!-- Row 2: Durations -->
  <div class="palette-row">
    <!-- Whole: wide flat open notehead, no stem, evenodd hole -->
    <button class="pal-btn" data-dur="w" data-action="selectDur" data-dur="w">
      <span class="pal-sym">
        <svg width="20" height="11" viewBox="0 0 20 11">
          <g transform="rotate(-15 10 5.5)">
            <path fill-rule="evenodd" fill="currentColor"
              d="M10,0.5 a8.5,4.5 0 1,0 0.01,0 Z M10,2.5 a4.5,2 0 1,1 -0.01,0 Z"/>
          </g>
        </svg>
      </span>
      <span class="pal-lbl">Whole</span>
    </button>
    <!-- Half: open notehead + tall stem -->
    <button class="pal-btn" data-dur="h" data-action="selectDur" data-dur="h">
      <span class="pal-sym">
        <svg width="15" height="30" viewBox="0 0 15 30">
          <g transform="rotate(-15 6 24)">
            <path fill-rule="evenodd" fill="currentColor"
              d="M6,19 a5.5,3.5 0 1,0 0.01,0 Z M6,21 a2.8,1.5 0 1,1 -0.01,0 Z"/>
          </g>
          <line x1="11.5" y1="23" x2="11.5" y2="1" stroke="currentColor" stroke-width="1.4"/>
        </svg>
      </span>
      <span class="pal-lbl">Half</span>
    </button>
    <!-- Quarter: solid notehead + tall stem -->
    <button class="pal-btn active" data-dur="q" data-action="selectDur" data-dur="q">
      <span class="pal-sym">
        <svg width="15" height="30" viewBox="0 0 15 30">
          <ellipse cx="6" cy="23" rx="5.5" ry="3.5" fill="currentColor" transform="rotate(-15 6 23)"/>
          <line x1="11.5" y1="23" x2="11.5" y2="1" stroke="currentColor" stroke-width="1.4"/>
        </svg>
      </span>
      <span class="pal-lbl">Quarter</span>
    </button>
    <!-- 8th: solid notehead + tall stem + one flag -->
    <button class="pal-btn" data-dur="8" data-action="selectDur" data-dur="8">
      <span class="pal-sym">
        <svg width="18" height="30" viewBox="0 0 18 30">
          <ellipse cx="6" cy="23" rx="5.5" ry="3.5" fill="currentColor" transform="rotate(-15 6 23)"/>
          <line x1="11.5" y1="23" x2="11.5" y2="1" stroke="currentColor" stroke-width="1.4"/>
          <path d="M11.5 1 C16 3, 17.5 8, 12.5 13" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="pal-lbl">8th</span>
    </button>
    <!-- 16th: solid notehead + tall stem + two flags -->
    <button class="pal-btn" data-dur="16" data-action="selectDur" data-dur="16">
      <span class="pal-sym">
        <svg width="18" height="30" viewBox="0 0 18 30">
          <ellipse cx="6" cy="23" rx="5.5" ry="3.5" fill="currentColor" transform="rotate(-15 6 23)"/>
          <line x1="11.5" y1="23" x2="11.5" y2="1" stroke="currentColor" stroke-width="1.4"/>
          <path d="M11.5 1 C16 3, 17.5 8, 12.5 13" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <path d="M11.5 7 C16 9, 17.5 14, 12.5 19" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="pal-lbl">16th</span>
    </button>
    <!-- 32nd: solid notehead + tall stem + three flags -->
    <button class="pal-btn" data-dur="32" data-action="selectDur" data-dur="32">
      <span class="pal-sym">
        <svg width="18" height="32" viewBox="0 0 18 32">
          <ellipse cx="6" cy="25" rx="5.5" ry="3.5" fill="currentColor" transform="rotate(-15 6 25)"/>
          <line x1="11.5" y1="25" x2="11.5" y2="1" stroke="currentColor" stroke-width="1.4"/>
          <path d="M11.5 1 C16 3, 17.5 8, 12.5 13" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <path d="M11.5 7 C16 9, 17.5 14, 12.5 19" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <path d="M11.5 13 C16 15, 17.5 20, 12.5 25" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="pal-lbl">32nd</span>
    </button>
    <!-- 64th: solid notehead + tall stem + four flags -->
    <button class="pal-btn" data-dur="64" data-action="selectDur" data-dur="64">
      <span class="pal-sym">
        <svg width="18" height="34" viewBox="0 0 18 34">
          <ellipse cx="6" cy="27" rx="5.5" ry="3.5" fill="currentColor" transform="rotate(-15 6 27)"/>
          <line x1="11.5" y1="27" x2="11.5" y2="1" stroke="currentColor" stroke-width="1.4"/>
          <path d="M11.5 1 C16 3, 17.5 7, 12.5 11" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <path d="M11.5 5 C16 7, 17.5 11, 12.5 15" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <path d="M11.5 9 C16 11, 17.5 15, 12.5 19" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <path d="M11.5 13 C16 15, 17.5 19, 12.5 23" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="pal-lbl">64th</span>
    </button>
  </div>
  <!-- Note input row — tap a letter to insert that note -->
  <div class="palette-row" id="note-row">
    <button class="pal-btn" id="btn-oct-dn" data-action="changeOctave" data-delta="-1">
      <span class="pal-sym pal-sym-0">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="9" y1="3" x2="9" y2="15"/>
          <polyline points="3,9 9,15 15,9"/>
        </svg>
      </span>
      <span class="pal-lbl">Oct ↓</span>
    </button>
    <button class="pal-btn note-key" data-action="insertNoteByName" data-name="C"><span class="pal-sym pal-sym-key">C</span></button>
    <button class="pal-btn note-key" data-action="insertNoteByName" data-name="D"><span class="pal-sym pal-sym-key">D</span></button>
    <button class="pal-btn note-key" data-action="insertNoteByName" data-name="E"><span class="pal-sym pal-sym-key">E</span></button>
    <button class="pal-btn note-key" data-action="insertNoteByName" data-name="F"><span class="pal-sym pal-sym-key">F</span></button>
    <button class="pal-btn note-key" data-action="insertNoteByName" data-name="G"><span class="pal-sym pal-sym-key">G</span></button>
    <button class="pal-btn note-key" data-action="insertNoteByName" data-name="A"><span class="pal-sym pal-sym-key">A</span></button>
    <button class="pal-btn note-key" data-action="insertNoteByName" data-name="B"><span class="pal-sym pal-sym-key">B</span></button>
    <button class="pal-btn" id="btn-oct-up" data-action="changeOctave" data-delta="1">
      <span class="pal-sym pal-sym-0">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="9" y1="15" x2="9" y2="3"/>
          <polyline points="3,9 9,3 15,9"/>
        </svg>
      </span>
      <span class="pal-lbl">Oct ↑</span>
    </button>
    <button class="pal-btn active-accent" data-action="insertRest" style="min-width:48px"><span class="pal-sym pal-sym-0">
      <svg viewBox="0 0 10 18" width="13" height="23" fill="currentColor">
        <g transform="translate(-482.02112,-143.61753)">
          <g transform="matrix(1.8,0,0,1.8,-471.40868,9.4615275)" stroke="none">
            <path d="M 531.098,74.847 C 530.578,74.945 530.18,75.304 530,75.8 C 529.961,75.96 529.961,75.999 529.961,76.218 C 529.961,76.519 529.98,76.679 530.121,76.917 C 530.32,77.316 530.738,77.636 531.215,77.753 C 531.715,77.894 532.551,77.773 533.508,77.456 L 533.746,77.374 L 532.57,80.624 L 531.414,83.87 C 531.414,83.87 531.453,83.89 531.516,83.933 C 531.633,84.011 531.832,84.07 531.973,84.07 C 532.211,84.07 532.512,83.933 532.551,83.812 C 532.551,83.773 533.109,81.878 533.785,79.628 L 534.98,75.503 L 534.941,75.445 C 534.844,75.324 534.645,75.285 534.523,75.382 C 534.484,75.421 534.422,75.503 534.383,75.562 C 534.203,75.863 533.746,76.398 533.508,76.597 C 533.289,76.777 533.168,76.796 532.969,76.718 C 532.789,76.62 532.73,76.519 532.609,75.98 C 532.492,75.445 532.352,75.202 532.051,75.003 C 531.773,74.824 531.414,74.765 531.098,74.847 z"/>
          </g>
        </g>
      </svg>
    </span><span class="pal-lbl">Rest</span></button>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;padding:2px 4px 3px">
    <span id="oct-display" class="oct-display">Octave 4</span>
    <span style="display:flex;gap:6px;align-items:center">
      <button id="btn-note-labels" class="note-labels-btn" data-action="toggleNoteLabels"><span id="note-labels-dot" class="note-labels-dot"></span><span id="note-labels-text">𝅘 Solfege</span></button>
      <button data-action="insertMeasure" class="btn-action-sm green">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>
        Measure</button>
      <button data-action="deleteMeasure" class="btn-action-sm red">
        <svg width="12" height="12" viewBox="0 0 14 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 4 L11 4 L10.5 14 L3.5 14 L3 4 Z"/>
          <line x1="1" y1="4" x2="13" y2="4"/>
          <line x1="5.5" y1="2" x2="8.5" y2="2"/>
          <line x1="6" y1="7" x2="6" y2="11"/>
          <line x1="8" y1="7" x2="8" y2="11"/>
        </svg>
        Measure</button>
      <button id="btn-linebreak" class="btn-action-sm orange" data-action="toggleLineBreak">
        <svg width="12" height="12" viewBox="0 0 16 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 7 L7 7 L7 1"/>
          <path d="M15 7 L9 7 L9 13"/>
          <line x1="1" y1="1" x2="1" y2="13"/>
          <line x1="15" y1="1" x2="15" y2="13"/>
        </svg>
        Line Break</button>
      <button id="btn-continuous" class="btn-action-sm orange" data-action="toggleContinuousView">
        <svg width="14" height="10" viewBox="0 0 18 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="1" y1="3" x2="17" y2="3"/>
          <line x1="1" y1="9" x2="17" y2="9"/>
          <line x1="1" y1="1" x2="1" y2="11"/>
          <line x1="17" y1="1" x2="17" y2="11"/>
        </svg>
        Continuous</button>
    </span>
